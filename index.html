<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>ELECTIVOS DE DISEÑO</title>
        <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @import url("https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap");

        :root {
            --color-oscurisimo: #000000;
            --color-oscuro: #000000;
            --color-normal: #2d359e;
            --color-iluminado: #2d359e;
            --color-iluminadisimo: #e1edff;
            --fuente: "Source Code Pro", monospace;
        }

        body {
            font-family: var(--fuente);
            color: var(--color-normal);
            text-align: center;
            font-size: 100%;
        }

        a {
            color: var(--color-oscuro);
            text-decoration: none;
        }

        a:hover {
            color: var(--color-oscurisimo);
            text-decoration: underline;
        }
        div#contenedor {
            margin: 1rem auto;
            width: 90%;
            max-width: 980px;
        }

        h1 {
            margin: 1rem 0;
            font-weight: 400;
            font-size: calc(100% + 3vw + 3vh);
        }

        h2 {
            margin: 3rem 0;
            font-weight: 400;
            letter-spacing: 0.25rem;
            font-size: calc(100% + 1vw + 1vh);
            color: var(--color-oscuro);
        }

        input {
            border: 0.1rem solid var(--color-iluminado);
            padding: 0.5rem 1rem;
            font-family: inherit;
            font-size: 15px;
            color: var(--color-oscuro);
            outline: none;
            margin-bottom: 1.5rem;
            width: 100%;
            display: block;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="%231f1f1f"><path d="M200-800v241-1 400-640 200-200Zm0 720q-33 0-56.5-23.5T120-160v-640q0-33 23.5-56.5T200-880h320l240 240v100q-19-8-39-12.5t-41-6.5v-41H480v-200H200v640h241q16 24 36 44.5T521-80H200Zm531-149q29-29 29-71t-29-71q-29-29-71-29t-71 29q-29 29-29 71t29 71q29 29 71 29t71-29ZM864-40 756-148q-21 14-45.5 21t-50.5 7q-75 0-127.5-52.5T480-300q0-75 52.5-127.5T660-480q75 0 127.5 52.5T840-300q0 26-7 50.5T812-204L920-96l-56 56Z"/></svg>');
            background-repeat: no-repeat;
            background-size: 1rem;
            background-position: 99% center;
        }

        input::placeholder {
            color: var(--color-iluminado);
        }

        input:focus {
            border-color: var(--color-normal);
        }

        div#contenedordetabla {
            overflow-x: auto;
            font-size: 90%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-bottom: 3rem;
        }

        thead {
            background: var(--color-iluminadisimo);
            color: var(--color-oscuro);
        }

        tbody {
            color: var(--color-normal);
        }

        td,
        th {
            border: 1px solid var(--color-normal);
            padding: 0.75rem;
        }

        th:nth-child(1),
        td:nth-child(1),
        th:nth-child(4),
        td:nth-child(4) {
            text-align: center;
        }

        td:nth-child(2) {
            color: var(--color-oscuro);
            font-weight: 800;
        }

        td:nth-child(3) {
            font-style: italic;
        }
        </style>
    </head>
    <body>
        <div id="contenedor">
            <h1>ദ്ദി◝ ⩊ ◜.ᐟ</h1>
            <h2>PROYECTOS DE TITULOS</h2>

            <input type="text" id="elInput" placeholder="Filtrar electivos…" />
            <div id="contenedordetabla">
                <table>
                    <thead>
                        <tr>
                            <th>N°</th>
                            <th>Titulad@/th>
                            <th>Proyecto</th>
                            <th>Nota</th>
                            <th>Categoría</th>
                            <th>Prof. Guía</th>
                        </tr>
                    </thead>
                    <tbody id="este"></tbody>
                </table>
            </div>
			
            <small>Diseño y visualización de información</small>
        </div>

        <script>
            const t = document.querySelector("#este");
            const URL = "https://api.myjson.online/v1/records/80104370-a699-4e54-84a0-d3946662c31e";

            fetch(URL)
                .then((respuesta) => {
                    if (!respuesta.ok) {
                        throw new Error("Error HTTP: " + respuesta.status);
                    }
                    return respuesta.json();
                })
                .then((datos) => {
                    var trabajo = datos.data;
                    console.log(trabajo);
                    trabajo.forEach((x) => {
                        t.innerHTML += `<tr style="${x.ok == 1 ? "background-color: var(--color-iluminadisimo); color: var(--color-oscurisimo)" : ""}"><td>${x.number}</td><td>${x.name}</td><td><a href="${x.repository}" target="_blank">${x.title}</a></td><td>${x.grade}</td><td>${x.category}</td><td>${x.tutor}</td></tr>`;
                    });
                })
                .catch((error) => {
                    console.error("Algo salió mal:", error);
                });

            function sinAcentos(str) {
                return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            }

            document.getElementById("elInput").addEventListener("keyup", function () {
                const valor = sinAcentos(this.value.toLowerCase());
                document.querySelectorAll("#este tr").forEach(function (fila) {
                    fila.style.display = sinAcentos(fila.textContent.toLowerCase()).includes(valor) ? "" : "none";
                });
            });
        </script>
    </body>
</html>
